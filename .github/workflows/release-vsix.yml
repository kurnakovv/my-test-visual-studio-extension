name: Deploy VSIX Preview

on:
  push:
    branches:
      - dev

permissions:
  contents: write

env:
  MANIFEST_PATH: VSIXProject1/source.extension.vsixmanifest

jobs:
  build-and-release-preview:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set preview version
        id: release_meta
        shell: pwsh
        run: |
          $version = "0.0.${env:GITHUB_RUN_NUMBER}"
          $releaseTag = "preview-$version"
          $releaseName = "VSIX Preview $version"

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_name=$releaseName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set VSIX manifest version
        shell: pwsh
        run: |
          [xml]$manifest = Get-Content -Path "${env:MANIFEST_PATH}"
          $namespaceUri = "http://schemas.microsoft.com/developer/vsx-schema/2011"
          $ns = New-Object System.Xml.XmlNamespaceManager($manifest.NameTable)
          $ns.AddNamespace("vsx", $namespaceUri)

          $identity = $manifest.SelectSingleNode("/vsx:PackageManifest/vsx:Metadata/vsx:Identity", $ns)
          if (-not $identity) { throw "Identity node not found in VSIX manifest." }
          $identity.SetAttribute("Version", "${{ steps.release_meta.outputs.version }}")
          $identity.SetAttribute("Id", "$($identity.GetAttribute('Id')).Preview")

          $displayName = $manifest.SelectSingleNode("/vsx:PackageManifest/vsx:Metadata/vsx:DisplayName", $ns)
          if (-not $displayName) { throw "DisplayName node not found in VSIX manifest." }
          $displayName.InnerText = "$($displayName.InnerText) Preview"

          $manifest.Save("${env:MANIFEST_PATH}")

      - name: Build solution (Release)
        run: dotnet build VSIXProject1.slnx --configuration Release

      - name: Locate VSIX output
        id: vsix
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path "VSIXProject1/bin/Release" -Filter "*.vsix" -Recurse |
            Where-Object { $_.Name -notlike "*.vsixmanifest" } |
            Select-Object -First 1
          if (-not $vsix) { throw "VSIX package not found under VSIXProject1/bin/Release." }
          "path=$($vsix.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create preview GitHub Release and upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: true
          generate_release_notes: true
          files: ${{ steps.vsix.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
